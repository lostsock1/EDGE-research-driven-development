# EDGE Gapped Lab — docker-compose.yml
# Alternative: run experiments with docker compose instead of lab-run.sh.
# Mostly useful for interactive debugging or when you need additional services.
#
# Usage:
#   docker compose -f lab/docker-compose.yml build
#   docker compose -f lab/docker-compose.yml run --rm lab

services:
  lab:
    build:
      context: .
      dockerfile: Dockerfile
    image: edge-gapped-lab:latest
    hostname: lab
    # Isolated by default — no network, no external access
    network_mode: none
    # Resource limits
    mem_limit: 2g
    cpus: 2
    # Mount experiment dir (override per run)
    volumes:
      - ./experiments/current:/lab/experiment:rw
      - ../projects:/lab/workspace/projects:ro
    # Ephemeral
    init: true
